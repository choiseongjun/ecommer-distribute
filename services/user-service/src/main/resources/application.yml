spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://postgres:5432/microservices
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    consul:
      host: consul
      port: 8500
      discovery:
        service-name: user-service
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  zipkin:
    tracing:
      endpoint: http://jaeger:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
