apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: bigdataplatform
data:
  # Consul Configuration
  CONSUL_HOST: "consul"
  CONSUL_PORT: "8500"
  
  # PostgreSQL Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "microservices"
  
  # Cassandra Configuration
  CASSANDRA_HOST: "cassandra"
  CASSANDRA_PORT: "9042"
  CASSANDRA_KEYSPACE: "products"
  
  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_TOPIC_ORDERS: "orders"
  
  # Elasticsearch Configuration
  ELASTICSEARCH_HOST: "elasticsearch"
  ELASTICSEARCH_PORT: "9200"
  
  # Jaeger Configuration
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
  JAEGER_SAMPLER_TYPE: "const"
  JAEGER_SAMPLER_PARAM: "1"
  
  # Spring Profiles
  SPRING_PROFILES_ACTIVE: "prod"
  
  # Application Ports
  API_GATEWAY_PORT: "8080"
  USER_SERVICE_PORT: "8081"
  ORDER_SERVICE_PORT: "8082"
  PRODUCT_SERVICE_PORT: "8083"
  NOTIFICATION_SERVICE_PORT: "8084"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: bigdataplatform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'consul'
        consul_sd_configs:
          - server: 'consul:8500'
            services: ['api-gateway', 'user-service', 'order-service', 'product-service', 'notification-service']
        relabel_configs:
          - source_labels: [__meta_consul_service_metadata_metrics_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_consul_service_address]
            target_label: __address__
            replacement: $1:8080
          - source_labels: [__meta_consul_service_metadata_metrics_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
      
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:8080']
        metrics_path: '/actuator/prometheus'
      
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:8081']
        metrics_path: '/actuator/prometheus'
      
      - job_name: 'order-service'
        static_configs:
          - targets: ['order-service:8082']
        metrics_path: '/actuator/prometheus'
      
      - job_name: 'product-service'
        static_configs:
          - targets: ['product-service:8083']
        metrics_path: '/actuator/prometheus'
      
      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:8084']
        metrics_path: '/actuator/prometheus'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: bigdataplatform
data:
  grafana.ini: |
    [server]
    http_port = 3000
    
    [security]
    admin_user = admin
    admin_password = admin
    
    [users]
    allow_sign_up = false
    
    [auth.anonymous]
    enabled = false
